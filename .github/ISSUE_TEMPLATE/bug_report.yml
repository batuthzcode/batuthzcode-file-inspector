name: Bug report
description: Report a reproducible problem in the desktop app, CLI or analysis engine
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: "Do not upload real malware, secrets or private documents. Use a harmless synthetic fixture or a hash."
  - type: dropdown
    id: component
    attributes:
      label: Component
      options: [Desktop UI, CLI, Analysis engine, Report export, Packaging, Documentation]
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v0.3.0 or commit hash
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      placeholder: Tell us exactly how to reproduce the issue.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected and actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: Linux distribution, Python version, installation method
